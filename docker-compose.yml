version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: publimatch_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: publimatch_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: publimatch_redis
    ports:
      - "6380:6379"
    restart: unless-stopped

volumes:
  postgres_data:
